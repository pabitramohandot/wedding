kind = "web"
previewPath = "/"
title = "Rahul & Taruna Wedding"
version = "1.0.0"
id = "artifacts/wedding"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22477

[services.development]
run = "pnpm --filter @workspace/wedding run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/wedding", "run", "build" ]
publicDir = "artifacts/wedding/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22477"
BASE_PATH = "/"
